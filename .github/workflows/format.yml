name: Format check

on:
  push:
  pull_request:

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - run: npx prettier --check "**/*.{md,yaml,yml,json}" --trailing-comma all --print-width 80 --single-quote true
